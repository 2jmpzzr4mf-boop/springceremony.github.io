<title>헤테로 자기소개표</title>
<link href="./헤테로 자기소개표_files/css2" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 테마 변수 ── */
:root {
  --paper:   #faf8f4;
  --ink:     #1e1a12;
  --rule:    #1e1a12;
  --sub:     #7a6a58;
  --muted:   #9a8878;
  --tint:    #c8b898;
  --tint2:   #ede8e0;
  --accent:  #1e1a12;
}
.t-rose      { --paper:#fff8f8; --ink:#2a1018; --rule:#2a1018; --sub:#8a5a60; --muted:#c09098; --tint:#e8c0c8; --tint2:#faeaec; --accent:#a03050; }
.t-lavender  { --paper:#f9f8ff; --ink:#1a1828; --rule:#1a1828; --sub:#5a5080; --muted:#9090c0; --tint:#c8c0e0; --tint2:#eeeaff; --accent:#4840a0; }
.t-mint      { --paper:#f6faf8; --ink:#101e18; --rule:#101e18; --sub:#3a6050; --muted:#70a890; --tint:#a8d0c0; --tint2:#dff0e8; --accent:#207858; }
.t-peach     { --paper:#fff9f4; --ink:#281808; --rule:#281808; --sub:#805030; --muted:#c09070; --tint:#e8c8a0; --tint2:#fff0e0; --accent:#b06020; }
.t-mono      { --paper:#ffffff; --ink:#111111; --rule:#111111; --sub:#555555; --muted:#999999; --tint:#cccccc; --tint2:#f0f0f0; --accent:#222222; }
.t-blue      { --paper:#f6f8ff; --ink:#0e1a2e; --rule:#0e1a2e; --sub:#2a4a78; --muted:#6888b8; --tint:#a8c0e0; --tint2:#dce8f8; --accent:#1a50a0; }

body {
  background: #ccc8c0;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 24px 20px 40px;
}

/* ── 컨트롤 바 ── */
#ctrl {
  max-width: 860px;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.ctrl-lbl { font-size: 10px; font-weight: 700; letter-spacing: .14em; color: #6a6060; text-transform: uppercase; }
.tdots { display: flex; gap: 6px; }
.tdot {
  width: 20px; height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .12s;
  flex-shrink: 0;
}
.tdot.on { border-color: #333; }
.tdot[data-t="default"]   { background: #c8b898; }
.tdot[data-t="rose"]      { background: #e8a0b0; }
.tdot[data-t="lavender"]  { background: #a8a0d0; }
.tdot[data-t="mint"]      { background: #80c0a8; }
.tdot[data-t="peach"]     { background: #d8a878; }
.tdot[data-t="blue"]      { background: #6090d0; }
.tdot[data-t="mono"]      { background: #888888; }
.btn-save {
  margin-left: auto;
  padding: 6px 18px;
  border: 1px solid #888;
  background: #fff;
  color: #333;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-save:hover { background: #f0ece8; }
.autosave-status {
  font-size: 10px;
  color: #7a8a70;
  font-family: 'Noto Sans KR', sans-serif;
  opacity: 0;
  transition: opacity .3s;
  white-space: nowrap;
}
.autosave-status.show { opacity: 1; }
.btn-reset {
  padding: 6px 14px;
  border: 1px solid #b88;
  background: #fff;
  color: #a03030;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-reset:hover { background: #fdf0f0; }

/* ── 카드 전체 ── */
#card {
  max-width: 860px;
  margin: 0 auto;
  background: var(--paper);
  border: 2px solid var(--rule);
  padding: 0;
  font-family: 'Noto Serif KR', serif;
  color: var(--ink);
}

/* ── 마스트헤드 ── */
.masthead {
  border-bottom: 4px double var(--rule);
  padding: 16px 24px 12px;
  text-align: center;
  position: relative;
}
.masthead-eyebrow {
  font-size: 9px;
  letter-spacing: .22em;
  color: var(--sub);
  font-family: 'Noto Sans KR', sans-serif;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.masthead-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: .28em;
  color: var(--ink);
  line-height: 1;
}


/* ── 헤더 행 (아바타 + 닉네임 + 한줄소개) ── */
.hdr-row {
  display: grid;
  grid-template-columns: 3fr 7fr;
  border-bottom: 1px solid var(--rule);
}
.hdr-avatar-cell {
  border-right: 1px solid var(--rule);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar-box {
  width: 140px;
  height: 140px;
  border: 1.5px solid var(--rule);
  background: var(--tint2);
  cursor: pointer;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}
.avatar-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
.avatar-hint { font-size: 9px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; text-align: center; line-height: 1.5; }
.avatar-box:hover::after {
  content: '업로드';
  position: absolute; inset: 0;
  background: rgba(0,0,0,.28);
  color: #fff;
  font-size: 10px;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; justify-content: center;
}
#avatarInput { display: none; }

.hdr-info-cell { padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
.hdr-nick-row { display: flex; flex-direction: column; gap: 6px; padding-bottom: 8px; }
.hdr-nick {
  font-size: 22px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; outline: none;
  font-family: 'Noto Serif KR', serif;
  width: 100%; padding-bottom: 5px;
}
.hdr-nick::placeholder { color: var(--muted); opacity: .5; font-weight: 400; }
.hdr-meta { display: flex; gap: 0; align-items: stretch; }
.hdr-meta-item { display: flex; gap: 5px; align-items: center; padding: 3px 0; }
.hdr-meta-item.age    { flex: 4; padding-right: 10px; border-right: 1px solid var(--tint); white-space: nowrap; }
.hdr-meta-item.platform { flex: 6; padding-left: 10px; }
.hdr-meta-label { font-size: 9px; letter-spacing: .1em; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; text-transform: uppercase; white-space: nowrap; }
.hdr-meta-input {
  border: none; border-bottom: 1px solid var(--tint); background: transparent; outline: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink);
  padding: 1px 2px; flex: 1; width: 0;
}
.hdr-intro {
  width: 100%; border: 1px solid var(--tint); background: var(--tint2); border-radius: 0;
  outline: none; font-family: 'Noto Sans KR', sans-serif; font-size: 11px; color: var(--ink);
  padding: 7px 9px; resize: none; line-height: 1.7;
}
.hdr-intro::placeholder { color: var(--muted); opacity: .7; }

/* ── 3단 메인 ── */
.body-cols {
  display: grid;
  grid-template-columns: 168px 1fr 1fr;
  border-bottom: 1px solid var(--rule);
}
.col {
  padding: 14px 15px;
  border-right: 1px solid var(--rule);
}
.col:last-child { border-right: none; }
.col-title {
  font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); font-family: 'Noto Sans KR', sans-serif;
  border-bottom: 1px solid var(--tint); padding-bottom: 5px; margin-bottom: 11px;
}

/* 블록 */
.blk { margin-bottom: 11px; }
.blk:last-child { margin-bottom: 0; }
.blk-label {
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); font-family: 'Noto Sans KR', sans-serif; margin-bottom: 4px;
}
.blk-field {
  width: 100%; border: none; border-bottom: 1px solid var(--tint);
  background: transparent; font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--ink); padding: 2px 0; outline: none;
}
.blk-field:focus { border-bottom-color: var(--accent); }

/* 체크 리스트 */
.cklist { display: flex; flex-wrap: wrap; gap: 3px 10px; }
.ck {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--ink); font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; user-select: none;
}
.ck-box {
  width: 11px; height: 11px;
  border: 1px solid var(--tint);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .1s, border-color .1s;
  font-size: 9px; color: transparent;
}
.ck.on .ck-box {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--paper);
}
.ck.on .ck-box::after { content: '✓'; font-size: 8px; line-height: 1; }

/* 텍스트에어리어 */
.blk-ta {
  width: 100%; border: 1px solid var(--tint);
  background: var(--tint2); font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; color: var(--ink); padding: 7px 9px;
  outline: none; resize: none; line-height: 1.9;
  min-height: 52px;
}
.blk-ta:focus { border-color: var(--accent); }

.blk-div { height: 1px; background: var(--tint); margin: 9px 0; }

/* ── 하단 와이드 행 (자주 언급 + FREE) ── */
.wide-rows { border-bottom: 1px solid var(--rule); }
.wide-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  border-bottom: 1px solid var(--tint);
}
.wide-row:last-child { border-bottom: none; }
.wide-row-label {
  padding: 11px 12px;
  border-right: 1px solid var(--tint);
  font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: flex-start; padding-top: 13px;
}
.wide-row-input {
  padding: 10px 16px;
}
.wide-ta {
  width: 100%; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink);
  outline: none; resize: none; line-height: 1.9; min-height: 52px;
}
.wide-ta:focus { outline: none; }

/* ── 모바일 반응형 ── */
@media (max-width: 600px) {
  body { padding: 14px 10px 32px; }

  #ctrl { gap: 8px; }
  .btn-save { margin-left: 0; width: 100%; text-align: center; padding: 10px; font-size: 13px; }

  #card { border-width: 1.5px; }

  .masthead { padding: 12px 14px 10px; }
  .masthead-title { font-size: 20px; letter-spacing: .18em; }
  .masthead-eyebrow { font-size: 8px; }

  /* 헤더: 세로 */
  .hdr-row {
    grid-template-columns: 1fr;
  }
  .hdr-avatar-cell {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    padding: 14px;
    justify-content: flex-start;
    gap: 14px;
    flex-direction: row;
    display: flex;
    align-items: center;
  }
  .hdr-info-cell { padding: 12px 14px; }
  .hdr-nick { font-size: 18px; }
  .hdr-meta { flex-direction: column; align-items: flex-start; gap: 6px; }
  .hdr-meta-item.age { flex: none; width: 100%; padding-right: 0; border-right: none; border-bottom: 1px solid var(--tint); padding-bottom: 6px; }
  .hdr-meta-item.platform { flex: none; width: 100%; padding-left: 0; }
  .hdr-meta-input { flex: 1; width: 0; }

  /* 본문: 3단 → 1단 세로 */
  .body-cols {
    grid-template-columns: 1fr;
  }
  .col {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    padding: 14px;
  }
  .col:last-child { border-bottom: none; }

  /* 푸터 */
  .footer { flex-direction: column; align-items: flex-start; gap: 6px; padding: 10px 14px; }
  .footer-tag-input { width: 100%; }
}

.footer {
  padding: 8px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 3px double var(--rule);
}
.footer-tag-input {
  border: none; background: transparent; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 10px; color: var(--muted);
  width: 320px;
}
.footer-badge {
  font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--sub); font-family: 'Noto Sans KR', sans-serif;
}
</style>

  <div class="tdots">

        <textarea class="blk-ta" rows="4"></textarea>
      </div>
    </div>

    <!-- 오른쪽: 좋아하는 작품 및 작가 + FREE -->
    <div class="col">
      <div class="col-title">Genre &amp; Free</div>

      <div class="blk">
        <div class="blk-label">좋아하는 작품 및 작가</div>
        <textarea class="blk-ta" rows="11"></textarea>
      </div>

      <div class="blk-div"></div>

      <div class="blk">
        <div class="blk-label">Free</div>
        <textarea class="blk-ta" rows="5"></textarea>
      </div>
    </div>

  </div><!-- body-cols -->

  <!-- 푸터 -->
  <div class="footer">
    <input class="footer-tag-input" maxlength="80">
    <div class="footer-badge">헤테로 자기소개표</div>
  </div>

</div><!-- card -->

<script src="./헤테로 자기소개표_files/html2canvas.min.js"></script>
<script>
// 테마
const themes = ['default','rose','lavender','mint','peach','mono'];
document.querySelectorAll('.tdot').forEach(d => {
  d.addEventListener('click', () => {
    document.querySelectorAll('.tdot').forEach(x => x.classList.remove('on'));
    d.classList.add('on');
    const card = document.getElementById('card');
    card.className = '';
    if (d.dataset.t !== 'default') card.classList.add('t-' + d.dataset.t);
  });
});

// 체크박스
document.querySelectorAll('.ck').forEach(ck => {
  ck.addEventListener('click', () => ck.classList.toggle('on'));
});

// 아바타
document.getElementById('avatarInput').addEventListener('change', function () {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const img = document.getElementById('avatarImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('avatarHint').style.display = 'none';
  };
  r.readAsDataURL(f);
});

// ── 로컬 저장 (localStorage) ──
const LS_KEY = 'heteroCardData_v1';

function getFieldEls() {
  // 아바타 파일 인풋은 제외, 그 외 카드 안의 input/textarea 전부
  return Array.from(document.querySelectorAll('#card input:not(#avatarInput), #card textarea'));
}
function getCkEls() {
  return Array.from(document.querySelectorAll('#card .ck'));
}

function collectData() {
  const activeTdot = document.querySelector('.tdot.on');
  const avatarImg = document.getElementById('avatarImg');
  return {
    theme: activeTdot ? activeTdot.dataset.t : 'default',
    avatar: avatarImg.style.display === 'block' ? avatarImg.src : '',
    fields: getFieldEls().map(el => el.value),
    checks: getCkEls().map(ck => ck.classList.contains('on')),
  };
}

function applyData(data) {
  if (!data) return;

  // 테마
  if (data.theme) {
    const dot = document.querySelector('.tdot[data-t="' + data.theme + '"]');
    if (dot) {
      document.querySelectorAll('.tdot').forEach(x => x.classList.remove('on'));
      dot.classList.add('on');
      const card = document.getElementById('card');
      card.className = '';
      if (data.theme !== 'default') card.classList.add('t-' + data.theme);
    }
  }

  // 아바타
  if (data.avatar) {
    const img = document.getElementById('avatarImg');
    img.src = data.avatar;
    img.style.display = 'block';
    document.getElementById('avatarHint').style.display = 'none';
  }

  // 입력 필드
  const fieldEls = getFieldEls();
  if (Array.isArray(data.fields)) {
    fieldEls.forEach((el, i) => {
      if (typeof data.fields[i] === 'string') el.value = data.fields[i];
    });
  }

  // 체크박스
  const ckEls = getCkEls();
  if (Array.isArray(data.checks)) {
    ckEls.forEach((ck, i) => {
      ck.classList.toggle('on', !!data.checks[i]);
    });
  }
}

function saveToLocalStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(collectData()));
    showAutosaveStatus();
  } catch (e) {
    // 용량 초과 등 저장 실패 시 조용히 무시 (아바타 이미지가 너무 클 수 있음)
    console.warn('로컬 저장 실패:', e);
  }
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    applyData(JSON.parse(raw));
  } catch (e) {
    console.warn('로컬 데이터 불러오기 실패:', e);
  }
}

let autosaveTimer = null;
function showAutosaveStatus() {
  const el = document.getElementById('autosaveStatus');
  el.textContent = '자동 저장됨';
  el.classList.add('show');
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

let debounceTimer = null;
function scheduleSave() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(saveToLocalStorage, 400);
}

// 페이지 로드 시 복원
loadFromLocalStorage();

// 입력 필드 변경 시 자동 저장
document.addEventListener('input', e => {
  if (e.target.matches('#card input, #card textarea')) scheduleSave();
});

// 체크박스, 테마 변경 시 자동 저장 (기존 클릭 핸들러 뒤에 저장 트리거)
document.querySelectorAll('.ck').forEach(ck => {
  ck.addEventListener('click', () => scheduleSave());
});
document.querySelectorAll('.tdot').forEach(d => {
  d.addEventListener('click', () => scheduleSave());
});

// 아바타 업로드 시 자동 저장
document.getElementById('avatarInput').addEventListener('change', () => {
  setTimeout(scheduleSave, 100); // FileReader 비동기 완료 후 저장
});

// 초기화 버튼
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('저장된 모든 내용을 삭제하고 새로 시작할까요?')) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
});

// PNG 저장 — 항상 PC 가로 버전(860px)으로 캡처
async function saveCard() {
  const card = document.getElementById('card');

  // 카드 복제
  const clone = card.cloneNode(true);
  const exportScopeId = 'pngExportClone_' + Date.now();
  clone.id = exportScopeId;
  clone.style.cssText = [
    'position:fixed',
    'top:-9999px',
    'left:-9999px',
    'width:860px',
    'max-width:860px',
    // 3단 그리드 강제
  ].join(';');

  // 파일 업로드 인풋(#avatarInput)은 캡처에 전혀 필요 없고, 브라우저가 채워넣는
  // "C:\fakepath\..." 값이 그대로 이미지에 찍히는 원인이 되므로 통째로 제거
  clone.querySelectorAll('input[type="file"]').forEach(el => el.remove());

  // 복제본 전용 스타일 — 반드시 #${exportScopeId}로 범위를 한정해야 함.
  // <style> 태그는 DOM 트리 어디에 붙어있든 상관없이 문서 전체에 전역 적용되므로,
  // 스코프를 안 걸면 저장 버튼을 누르는 순간 실제 화면(원본 카드)에도
  // 이 스타일이 그대로 새어 들어가 레이아웃이 잠깐 깨져 보이는 문제가 생김.
  const overrideStyle = document.createElement('style');
  const scope = '#' + exportScopeId;
  overrideStyle.textContent = `
    ${scope} .hdr-row { display: grid !important; grid-template-columns: 3fr 7fr !important; }
    ${scope} .hdr-avatar-cell { border-right: 1px solid var(--rule) !important; border-bottom: none !important; flex-direction: column !important; justify-content: center !important; }
    ${scope} .hdr-info-cell { padding: 14px 18px !important; }
    ${scope} .hdr-nick { font-size: 22px !important; }
    ${scope} .hdr-meta { flex-direction: row !important; align-items: stretch !important; gap: 0 !important; }
    ${scope} .hdr-meta-item { align-items: center !important; }
    ${scope} .hdr-meta-item.age { flex: 4 !important; padding: 0 10px 0 0 !important; border-right: 1px solid var(--tint) !important; border-bottom: none !important; width: auto !important; }
    ${scope} .hdr-meta-item.platform { flex: 6 !important; padding-left: 10px !important; padding-bottom: 3px !important; border-bottom: none !important; width: auto !important; }
    ${scope} .hdr-meta-input { flex: 1 !important; width: 0 !important; }
    ${scope} .body-cols { display: grid !important; grid-template-columns: 168px 1fr 1fr !important; }
    ${scope} .col { border-right: 1px solid var(--rule) !important; border-bottom: none !important; }
    ${scope} .col:last-child { border-right: none !important; }
    ${scope} .footer { flex-direction: row !important; align-items: center !important; }
    ${scope} .footer-tag-input { width: 320px !important; }
  `;
  clone.appendChild(overrideStyle);

  // html2canvas는 flex-wrap으로 두 줄이 된 요소를 align-items:center로
  // 세로 중앙정렬하는 계산을 정확히 못 해서(라벨이 위로 붙어버림),
  // "연령대" 항목만 table/table-cell 구조로 바꿔서 확실하게 중앙정렬되게 함
  (function fixAgeVerticalAlign() {
    const ageItem = clone.querySelector('.hdr-meta-item.age');
    if (!ageItem) return;
    const label = ageItem.querySelector('.hdr-meta-label');
    const cklist = ageItem.querySelector('.cklist');
    if (!label || !cklist) return;

    ageItem.style.display = 'table';
    ageItem.style.width = '100%';

    label.style.display = 'table-cell';
    label.style.verticalAlign = 'middle';
    label.style.paddingRight = '6px';

    // cklist 자체의 display는 flex를 유지해야 체크박스들이 줄바꿈되므로,
    // cklist를 새 table-cell 래퍼로 감싸기만 함 (cklist 자체는 건드리지 않음)
    const wrapper = document.createElement('div');
    wrapper.style.display = 'table-cell';
    wrapper.style.verticalAlign = 'middle';
    cklist.parentNode.insertBefore(wrapper, cklist);
    wrapper.appendChild(cklist);
  })();

  // input/textarea 값 span으로 교체 (글자 꺼짐 방지)
  // 주의: type="file" 인풋은 제외해야 함 (위에서 이미 clone에서는 제거했지만
  // origInputs 쪽 인덱스를 cloneInputs와 동일하게 맞추기 위해 양쪽 다 동일 셀렉터 사용)
  const origInputs = card.querySelectorAll('input:not([type="file"]), textarea');
  const cloneInputs = clone.querySelectorAll('input:not([type="file"]), textarea');
  cloneInputs.forEach((el, i) => {
    const orig = origInputs[i];
    const val = orig ? orig.value : el.value;
    const cs = window.getComputedStyle(orig || el);
    const span = document.createElement('span');
    span.textContent = val;
    span.style.cssText = [
      'display:inline-block',
      'font-family:' + cs.fontFamily,
      'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight,
      'color:' + cs.color,
      'letter-spacing:' + cs.letterSpacing,
      'line-height:' + cs.lineHeight,
      'width:' + cs.width,
      'height:' + cs.height,
      'padding:' + cs.padding,
      'white-space:pre-wrap',
      'word-break:break-all',
      'vertical-align:middle',
      'border:' + cs.border,
      'border-bottom:' + cs.borderBottom,
      'background:' + cs.backgroundColor,
      'box-sizing:border-box',

    ].join(';');
    el.parentNode.insertBefore(span, el);
    el.remove();
  });

  document.body.appendChild(clone);

  // 웹폰트(Noto Serif KR / Noto Sans KR)가 완전히 로드된 뒤에 캡처해야
  // html2canvas가 기본 시스템 폰트로 대체 렌더링하는 문제를 막을 수 있음
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch (e) { /* 폰트 로딩 API 미지원 브라우저는 그냥 진행 */ }
  // 레이아웃/폰트 반영을 위해 두 프레임 정도 여유를 둠
  await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

  // 현재 선택된 테마의 카드 배경색(--paper)을 그대로 캡처 배경색으로 사용
  const themePaperColor = window.getComputedStyle(card).getPropertyValue('background-color').trim();

  html2canvas(clone, {
    scale: 3,
    useCORS: true,
    backgroundColor: themePaperColor || '#faf8f4',
    logging: false,
    width: 860,
    windowWidth: 860,
  }).then(canvas => {
    clone.remove();
    const a = document.createElement('a');
    a.download = 'HL-Self-Introduction.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }).catch(() => clone.remove());
}
</script>


</body></html>
